# ── Application ──────────────────────────────────────────
spring.application.name=hospital

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────
# validate = Hibernate checks your entities match the DB, but won't change tables
# (Flyway manages tables, not Hibernate)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT (we'll use this in Phase 6) ──────────────────────
jwt.secret=long-secret-key-at-least-256-bits-long-change-this
jwt.expiration=86400000